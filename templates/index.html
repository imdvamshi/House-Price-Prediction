<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyd House Price Prediction</title>
    <style>

    body{
        font-family: Arial, sans-serif;
        background-color:#f4f4f4;
        padding:40px;
    }

    .container{
        width:600px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0px 0px 10px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:25px;
    }

    label{
        display:block;
        margin-bottom:5px;
        font-weight:500;
    }

    input,select{
        width:100%;
        height:45px;
        padding:10px;
        box-sizing:border-box;
        margin-bottom:12px;
    }

    button{
        width:100%;
        padding:12px;
        background:#007bff;
        color:white;
        border:none;
        cursor:pointer;
        font-size:16px;
        margin-top:10px;
    }

    button:hover{
        background:#0056b3;
    }

    h2{
        text-align:center;
        color:green;
        margin-top:20px;
    }

    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 House Price Prediction</h1>
        <form action="/predict" method="POST">
            <label>Rate Per Square Feet</label><input type="number" name="rate" required>
            <label>Area in Square Feet</label><input type="number" name="area" required>
            <label>Property Type</label><select name="title" required>
                <option value="" disabled selected>Select Property Type</option>
                <option value="3 BHK Apartment">3 BHK Apartment</option>
                <option value="2 BHK Apartment">2 BHK Apartment</option>
                <option value="4 BHK Apartment">4 BHK Apartment</option>
                <option value="2 BHK Independent House">2 BHK Independent House</option>
                <option value="4 BHK Villa">4 BHK Villa</option>
                <option value="3 BHK Villa">3 BHK Villa</option>
                <option value="4 BHK Independent House">4 BHK Independent House</option>
                <option value="3 BHK Independent House">3 BHK Independent House</option>
                <option value="5 BHK Villa">5 BHK Villa</option>
                <option value="2 BHK Independent Floor">2 BHK Independent Floor</option>
                <option value="5 BHK Independent House">5 BHK Independent House</option>
                <option value="1 BHK Apartment">1 BHK Apartment</option>
                <option value="3 BHK Independent Floor">3 BHK Independent Floor</option>
                <option value="5 BHK Apartment">5 BHK Apartment</option>
                <option value="2 BHK Villa">2 BHK Villa</option>
                <option value="7 BHK Independent House">7 BHK Independent House</option>
                <option value="6 BHK Villa">6 BHK Villa</option>
                <option value="8 BHK Independent House">8 BHK Independent House</option>
                <option value="1 RK Studio Apartment">1 RK Studio Apartment</option>
                <option value="10 BHK Independent House">10 BHK Independent House</option>
                <option value="1 BHK Independent House">1 BHK Independent House</option>
                <option value="4 BHK Independent Floor">4 BHK Independent Floor</option>
                <option value="6 BHK Independent House">6 BHK Independent House</option>
                <option value="9 BHK Independent House">9 BHK Independent House</option>
            </select>
            <label>Location</label>
            <select name="location" required>
            <option value="" disabled selected>Select Location</option>
            {% for loc in location %}
            <option value="{{ loc }}">{{ loc }}</option>
            {% endfor %}
            </select>
            <label>Building Status</label><select name="building_status" required>
            <option value="" disabled selected>Select Building Status</option>
            <option value="New">New</option>
            <option value="Ready To Move">Ready To Move</option>
            <option value="Under Construction">Under Construction</option>
            <option value="Resale">Resale</option>
            </select>
            <button type="submit">Predict Price</button>
        </form>
        <h2 style="color:red;">
    {{ prediction_text }}
        </h2>
    </div>
</script>
</body>
</html>
